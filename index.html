<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baha Savage - Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

.hero-wrap{position:relative;width:100%;height:100vh;min-height:600px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(180deg,#F8F3ED 0%,#9C190D 100%)}
.hero-img{position:absolute;inset:0;background-image:url('hero-baha.jpg');background-size:cover;background-position:50% 50%;background-repeat:no-repeat}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.45) 0%,rgba(0,0,0,0.3) 45%,rgba(0,0,0,0.55) 100%)}
.hero-content{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}

.title-text{font-family:'Instrument Serif',serif;font-weight:400;font-style:normal;color:#fff;text-align:center;line-height:1;letter-spacing:0;user-select:none}
.title-lg{font-size:clamp(80px,17vw,250px);margin-top:2vh}

.bottom-row{position:absolute;bottom:clamp(60px,12vh,140px);left:0;right:0;display:flex;align-items:center;justify-content:center;gap:clamp(16px,3vw,40px);padding:0 24px;flex-wrap:wrap}
.coming-soon{font-family:'Instrument Serif',serif;font-weight:400;font-style:italic;color:#fff;font-size:clamp(26px,3.5vw,45px);line-height:1.2;white-space:nowrap}

.btn-subscribe{border:none;outline:none;cursor:pointer;background:#D3030A;color:#F8F3ED;font-family:'Montserrat',sans-serif;font-weight:500;font-size:14px;text-transform:uppercase;letter-spacing:0.1em;line-height:1.5;padding:15px 40px;border-radius:30px;transition:background-color 0.5s,border-color 0.5s}
.btn-subscribe:hover{background:#9C190D}

.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.3);display:flex;align-items:flex-start;justify-content:center;padding-top:clamp(30px,6vh,80px);opacity:0;visibility:hidden;pointer-events:none;transition:opacity 0.5s ease,visibility 0.5s ease}
.overlay.open{opacity:1;visibility:visible;pointer-events:auto}

.popup-card{position:relative;width:min(800px,90vw);background:#000;border-radius:4px;padding:clamp(40px,6vh,70px) clamp(30px,5vw,80px) clamp(40px,6vh,70px);display:flex;flex-direction:column;align-items:center;transform:translateY(20px);transition:transform 0.5s ease}
.overlay.open .popup-card{transform:translateY(0)}

.popup-close{position:absolute;top:clamp(16px,3vh,58px);right:clamp(16px,2vw,42px);width:clamp(32px,5vw,77px);height:clamp(32px,5vw,81px);cursor:pointer;background:none;border:none;outline:none;padding:0}
.popup-close svg{fill:rgba(255,255,255,0.8);transition:fill 0.25s;width:100%;height:100%}
.popup-close:hover svg{fill:#fff}

.popup-title{font-family:'Instrument Serif',serif;font-weight:400;font-style:italic;color:#fff;font-size:clamp(34px,5vw,65px);line-height:1.2;text-align:center;margin-bottom:clamp(16px,2vh,28px)}
.popup-desc{font-family:'Montserrat',sans-serif;font-weight:500;color:#fff;font-size:clamp(13px,1.4vw,18px);line-height:1.6;text-align:center;margin-bottom:clamp(24px,4vh,40px);max-width:612px}

.email-form{display:flex;gap:0;width:min(560px,100%);flex-direction:row}
.email-input{flex:1;padding:14px 20px;border:1px solid rgba(255,255,255,0.3);border-right:none;background:transparent;color:#fff;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;outline:none;border-radius:30px 0 0 30px;transition:border-color 0.3s}
.email-input::placeholder{color:rgba(255,255,255,0.5)}
.email-input:focus{border-color:rgba(255,255,255,0.7)}

.btn-submit{border:none;outline:none;cursor:pointer;background:#D3030A;color:#F8F3ED;font-family:'Montserrat',sans-serif;font-weight:500;font-size:14px;text-transform:uppercase;letter-spacing:0.1em;line-height:1.5;padding:14px 32px;border-radius:0 30px 30px 0;transition:background-color 0.5s;white-space:nowrap}
.btn-submit:hover{background:#9C190D}

.success-msg{font-family:'Montserrat',sans-serif;font-weight:500;color:#FFF59E;font-size:16px;text-align:center;margin-top:16px}

@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.anim-title{animation:fadeInUp 1s ease-out 0.2s both}
.anim-bottom{animation:fadeIn 1s ease-out 0.8s both}

@media(max-width:600px){
  .hero-wrap{height:100svh}
  .title-lg{font-size:clamp(56px,20vw,90px)}
  .bottom-row{flex-direction:column;gap:18px;bottom:clamp(40px,9vh,90px)}
  .coming-soon{font-size:clamp(24px,7vw,34px)}
  .btn-subscribe{padding:14px 44px}
  .popup-card{padding:48px 24px}
  .email-form{flex-direction:column;gap:12px}
  .email-input{border:1px solid rgba(255,255,255,0.3);border-radius:30px;text-align:center;padding:14px 20px}
  .btn-submit{border-radius:30px;padding:15px 32px}
  .popup-close{top:16px;right:16px;width:34px;height:34px}
}
</style>
</head>
<body>

<div class="hero-wrap">
  <div class="hero-bg"></div>
  <div class="hero-img"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="title-text title-lg anim-title">BAHA SAVAGE</div>
    <div class="bottom-row anim-bottom">
      <span class="coming-soon">coming soon</span>
      <button class="btn-subscribe" id="openPopup">subscribe</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="popup-card" id="popupCard">
    <button class="popup-close" id="closePopup" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><polygon points="405 121.8 390.2 107 256 241.2 121.8 107 107 121.8 241.2 256 107 390.2 121.8 405 256 270.8 390.2 405 405 390.2 270.8 256 405 121.8"></polygon></svg>
    </button>
    <h2 class="popup-title"><i>Almost</i> there!</h2>
    <p class="popup-desc">Sign up with your email to be the first to know when we launch.</p>
    <div id="formArea">
      <div class="email-form" id="emailForm">
        <input class="email-input" id="emailInput" type="email" placeholder="Enter your email">
        <button class="btn-submit" id="submitBtn">subscribe</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var overlay = document.getElementById('overlay');
  var popupCard = document.getElementById('popupCard');
  var emailInput = document.getElementById('emailInput');
  var formArea = document.getElementById('formArea');

  document.getElementById('openPopup').addEventListener('click', function() {
    formArea.innerHTML = '<div class="email-form"><input class="email-input" id="emailInput" type="email" placeholder="Enter your email"><button class="btn-submit" id="submitBtn">subscribe</button></div>';
    attachFormListeners();
    overlay.classList.add('open');
  });

  document.getElementById('closePopup').addEventListener('click', function() {
    overlay.classList.remove('open');
  });

  overlay.addEventListener('click', function() {
    overlay.classList.remove('open');
  });

  popupCard.addEventListener('click', function(e) {
    e.stopPropagation();
  });

  function attachFormListeners() {
    var input = document.getElementById('emailInput');
    var btn = document.getElementById('submitBtn');
    if (!input || !btn) return;

    btn.addEventListener('click', doSubmit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSubmit();
    });
  }

  var CRM_API = 'http://localhost:3001';

  function doSubmit() {
    var input = document.getElementById('emailInput');
    if (!input) return;
    var email = input.value.trim();
    if (email && email.indexOf('@') > -1 && email.indexOf('.') > -1) {
      var btn = document.getElementById('submitBtn');
      if (btn) btn.textContent = '...';
      fetch(CRM_API + '/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      }).then(function(r) { return r.json(); }).then(function() {
        formArea.innerHTML = '<div class="success-msg">You\'re on the list. We\'ll be in touch soon.</div>';
      }).catch(function() {
        formArea.innerHTML = '<div class="success-msg">You\'re on the list. We\'ll be in touch soon.</div>';
      });
    }
  }

  attachFormListeners();
})();
</script>
</body>
</html>
